{% extends 'layouts/app.html' %}

{% block nav_products %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Products{% endblock %}

{% block page_content %}
<div x-data="productsIndex()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Products</h1>
        <a href="/products/create" class="mt-4 sm:mt-0 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
            <i class="fas fa-plus mr-2"></i>
            Add Product
        </a>
    </div>
    
    <!-- Search and Filters -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" x-model="search" @input.debounce.300ms="loadData()"
                        placeholder="Search products..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select x-model="filters.category" @change="loadData()"
                    class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                    <option value="">All Categories</option>
                    <template x-for="category in categories" :key="category.id">
                        <option :value="category.id" x-text="category.name"></option>
                    </template>
                </select>
                <select x-model="perPage" @change="loadData()"
                    class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                    <option value="10">10 per page</option>
                    <option value="25">25 per page</option>
                    <option value="50">50 per page</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <!-- Empty State -->
    <template x-if="!loading && products.length === 0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-12 text-center">
            <i class="fas fa-box text-5xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">No products found</p>
            <a href="/products/create" class="mt-4 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                <i class="fas fa-plus mr-2"></i> Add Product
            </a>
        </div>
    </template>

    <!-- Mobile Cards -->
    <div x-show="!loading && products.length > 0" class="md:hidden space-y-4">
        <template x-for="product in products" :key="product.id">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                <div class="flex items-start justify-between mb-3">
                    <div>
                        <a :href="'/products/' + product.id" class="text-indigo-600 hover:text-indigo-800 font-semibold text-lg" x-text="product.name"></a>
                        <p class="text-gray-500 text-sm" x-text="product.code || '-'"></p>
                    </div>
                    <span class="text-lg font-bold text-gray-800" x-text="formatCurrency(product.default_price)"></span>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-500">Category</span>
                        <span x-text="product.category_name || '-'"></span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-500">Unit</span>
                        <span x-text="product.unit || '-'"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>
    
    <!-- Desktop Table -->
    <div x-show="!loading && products.length > 0" class="hidden md:block bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Code</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Unit</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <template x-for="product in products" :key="product.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a :href="'/products/' + product.id" class="text-indigo-600 hover:text-indigo-800 font-medium" x-text="product.name"></a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500" x-text="product.code || '-'"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500" x-text="product.category_name || '-'"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500" x-text="product.unit || '-'"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-right font-medium" x-text="formatCurrency(product.default_price)"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs rounded-full" 
                                    :class="product.active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
                                    x-text="product.active ? 'Active' : 'Inactive'"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                <div class="flex items-center justify-end gap-2">
                                    <a :href="'/products/' + product.id" class="text-gray-500 hover:text-indigo-600" title="View">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a :href="'/products/' + product.id + '/edit'" class="text-gray-500 hover:text-blue-600" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button @click="deleteProduct(product)" class="text-gray-500 hover:text-red-600" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Pagination -->
    <div x-show="!loading && meta.last_page > 1" class="mt-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <p class="text-gray-500 text-sm">
            Showing <span x-text="((meta.current_page - 1) * perPage) + 1"></span> to 
            <span x-text="Math.min(meta.current_page * perPage, meta.total)"></span> of 
            <span x-text="meta.total"></span> products
        </p>
        <div class="flex items-center gap-2">
            <button @click="prevPage()" :disabled="meta.current_page === 1"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="text-gray-700">Page <span x-text="meta.current_page"></span> of <span x-text="meta.last_page"></span></span>
            <button @click="nextPage()" :disabled="meta.current_page === meta.last_page"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
function productsIndex() {
    return {
        products: [],
        categories: [],
        loading: true,
        search: '',
        filters: {
            category: ''
        },
        perPage: 25,
        meta: {
            current_page: 1,
            last_page: 1,
            total: 0
        },
        
        async init() {
            await this.loadCategories();
            await this.loadData();
        },
        
        async loadCategories() {
            try {
                const response = await fetch('/api/v1/products/categories/', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.categories = data.data;
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        },
        
        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.meta.current_page,
                    per_page: this.perPage,
                    search: this.search
                });
                
                if (this.filters.category) {
                    params.append('category', this.filters.category);
                }
                
                const response = await fetch('/api/v1/products/?' + params.toString(), {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    this.products = data.data;
                    this.meta = data.meta;
                }
            } catch (error) {
                console.error('Error loading products:', error);
            }
            this.loading = false;
        },
        
        async deleteProduct(product) {
            if (!confirm(`Delete product "${product.name}"?`)) return;
            
            try {
                const response = await fetch('/api/v1/products/' + product.id + '/', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    await this.loadData();
                }
            } catch (error) {
                console.error('Error deleting product:', error);
            }
        },
        
        prevPage() {
            if (this.meta.current_page > 1) {
                this.meta.current_page--;
                this.loadData();
            }
        },
        
        nextPage() {
            if (this.meta.current_page < this.meta.last_page) {
                this.meta.current_page++;
                this.loadData();
            }
        },
        
        formatCurrency(amount) {
            if (amount === null || amount === undefined) return '-';
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount / 100);
        }
    }
}
</script>
{% endblock %}
