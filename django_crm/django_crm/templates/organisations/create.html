{% extends 'layouts/app.html' %}

{% block nav_organisations %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Add Organisation{% endblock %}

{% block page_content %}
<div x-data="organisationCreate()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/organisations" class="text-gray-500 hover:text-gray-700 mr-4">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Add Organisation</h1>
        </div>
    </div>
    
    <!-- Form -->
    <form @submit.prevent="submit()" class="bg-white rounded-xl shadow-sm border border-gray-200">
        <div class="p-6 space-y-6">
            <!-- Error Display -->
            <div x-show="errorMsg" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                <p x-text="errorMsg"></p>
            </div>
            
            <!-- Basic Information -->
            <div>
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Basic Information</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
                        <input type="text" x-model="form.name" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                        <input type="text" x-model="form.phone"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
            </div>
            
            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea x-model="form.description" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
            </div>
            
            <!-- Address -->
            <div>
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Address</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 1</label>
                        <input type="text" x-model="form.address_line_1"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 2</label>
                        <input type="text" x-model="form.address_line_2"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                        <input type="text" x-model="form.city"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">State/Province</label>
                        <input type="text" x-model="form.state"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Postcode</label>
                        <input type="text" x-model="form.postcode"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
                        <input type="text" x-model="form.country"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="px-4 sm:px-6 py-4 bg-gray-50 border-t border-gray-200 flex flex-col-reverse sm:flex-row sm:justify-end gap-3 rounded-b-xl">
            <a href="/organisations" class="w-full sm:w-auto text-center px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition">
                Cancel
            </a>
            <button type="submit" :disabled="submitting"
                class="w-full sm:w-auto px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition disabled:opacity-50">
                <i x-show="submitting" class="fas fa-spinner fa-spin mr-2"></i>
                <span x-text="submitting ? 'Saving...' : 'Save Organisation'"></span>
            </button>
        </div>
    </form>
</div>

<script>
function organisationCreate() {
    return {
        form: {
            name: '', phone: '', description: '',
            address_line_1: '', address_line_2: '',
            city: '', state: '', postcode: '', country: ''
        },
        submitting: false,
        errorMsg: '',
        
        async submit() {
            this.submitting = true;
            this.errorMsg = '';
            
            try {
                // Build proper API payload structure
                const payload = {
                    name: this.form.name,
                    description: this.form.description || null,
                    phones: this.form.phone ? [{ number: this.form.phone, type: 'work', primary: true }] : [],
                    addresses: (this.form.address_line_1 || this.form.city) ? [{
                        line1: this.form.address_line_1 || null,
                        line2: this.form.address_line_2 || null,
                        city: this.form.city || null,
                        state: this.form.state || null,
                        code: this.form.postcode || null,
                        country: this.form.country || null,
                        primary: true
                    }] : []
                };
                
                const res = await api.post('/organisations/', payload);
                if (res?.ok) {
                    const data = await res.json();
                    window.location.href = '/organisations/' + (data.data?.id || data.id) + '/';
                } else {
                    const err = await res?.json();
                    console.error('API Error:', err);
                    this.errorMsg = err?.message || err?.detail || JSON.stringify(err.errors || err) || 'Failed to create organisation';
                }
            } catch (e) {
                console.error(e);
                this.errorMsg = 'An error occurred. Please try again.';
            }
            
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
