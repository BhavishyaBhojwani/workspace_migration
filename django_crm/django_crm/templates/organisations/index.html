{% extends 'layouts/app.html' %}

{% block nav_organisations %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Organisations{% endblock %}

{% block page_content %}
<div x-data="organisationsIndex()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Organisations</h1>
        <a href="/organisations/create" class="mt-4 sm:mt-0 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
            <i class="fas fa-plus mr-2"></i>
            Add Organisation
        </a>
    </div>
    
    <!-- Search and Filters -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" x-model="search" @input.debounce.300ms="loadData()"
                        placeholder="Search organisations..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select x-model="perPage" @change="loadData()"
                    class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                    <option value="10">10 per page</option>
                    <option value="25">25 per page</option>
                    <option value="50">50 per page</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <!-- Empty State -->
    <template x-if="!loading && organisations.length === 0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-12 text-center">
            <i class="fas fa-building text-5xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">No organisations found</p>
            <a href="/organisations/create" class="mt-4 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                <i class="fas fa-plus mr-2"></i> Add Organisation
            </a>
        </div>
    </template>

    <!-- Mobile Cards (visible on small screens) -->
    <div x-show="!loading && organisations.length > 0" class="md:hidden space-y-4">
        <template x-for="org in organisations" :key="org.id">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                <div class="flex items-start justify-between mb-3">
                    <a :href="'/organisations/' + org.id" class="text-indigo-600 hover:text-indigo-800 font-semibold text-lg" x-text="org.name"></a>
                    <div class="flex items-center gap-1">
                        <a :href="'/organisations/' + org.id" class="p-2 text-gray-500 hover:text-indigo-600">
                            <i class="fas fa-eye"></i>
                        </a>
                        <a :href="'/organisations/' + org.id + '/edit'" class="p-2 text-gray-500 hover:text-blue-600">
                            <i class="fas fa-edit"></i>
                        </a>
                        <button @click="deleteOrg(org)" class="p-2 text-gray-500 hover:text-red-600">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex items-start" x-show="org.address_line_1 || org.city">
                        <i class="fas fa-map-marker-alt w-5 text-gray-400 mt-0.5"></i>
                        <span class="text-gray-600 ml-2" x-text="[org.address_line_1, org.city, org.state].filter(Boolean).join(', ')"></span>
                    </div>
                    <div class="flex items-center" x-show="org.phone">
                        <i class="fas fa-phone w-5 text-gray-400"></i>
                        <span class="text-gray-600 ml-2" x-text="org.phone"></span>
                    </div>
                    <div class="flex items-center text-gray-400 text-xs pt-2 border-t border-gray-100">
                        <i class="fas fa-clock w-5"></i>
                        <span class="ml-2" x-text="'Created ' + formatDate(org.created_at)"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>
    
    <!-- Desktop Table (hidden on small screens) -->
    <div x-show="!loading && organisations.length > 0" class="hidden md:block bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Address</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <template x-for="org in organisations" :key="org.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a :href="'/organisations/' + org.id" class="text-indigo-600 hover:text-indigo-800 font-medium" x-text="org.name"></a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-600">
                                <span x-text="[org.address_line_1, org.city, org.state].filter(Boolean).join(', ') || '-'"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-600" x-text="org.phone || '-'"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-600" x-text="formatDate(org.created_at)"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <a :href="'/organisations/' + org.id" class="p-2 text-gray-500 hover:text-indigo-600" title="View">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a :href="'/organisations/' + org.id + '/edit'" class="p-2 text-gray-500 hover:text-blue-600" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button @click="deleteOrg(org)" class="p-2 text-gray-500 hover:text-red-600" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Pagination -->
    <div x-show="!loading && meta.last_page > 1" class="mt-4 bg-white rounded-xl shadow-sm border border-gray-200 px-4 py-3">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <p class="text-sm text-gray-600 text-center sm:text-left">
                Showing <span x-text="meta.from || 0"></span> to <span x-text="meta.to || 0"></span> of <span x-text="meta.total || 0"></span>
            </p>
            <div class="flex items-center justify-center gap-2">
                <button @click="goToPage(meta.current_page - 1)" :disabled="meta.current_page <= 1"
                    class="px-3 py-2 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span class="px-3 py-2 text-sm font-medium" x-text="meta.current_page + ' / ' + meta.last_page"></span>
                <button @click="goToPage(meta.current_page + 1)" :disabled="meta.current_page >= meta.last_page"
                    class="px-3 py-2 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function organisationsIndex() {
    return {
        organisations: [],
        loading: true,
        search: '',
        perPage: 10,
        page: 1,
        meta: {},
        
        async init() {
            await this.loadData();
        },
        
        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.page,
                    per_page: this.perPage
                });
                if (this.search) params.append('search', this.search);
                
                const res = await api.get('/organisations/?' + params.toString());
                if (res?.ok) {
                    const data = await res.json();
                    this.organisations = data.data || [];
                    this.meta = data.meta || {};
                }
            } catch (e) { console.error(e); }
            this.loading = false;
        },
        
        goToPage(p) {
            if (p >= 1 && p <= this.meta.last_page) {
                this.page = p;
                this.loadData();
            }
        },
        
        formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString();
        },
        
        async deleteOrg(org) {
            if (!confirm(`Delete "${org.name}"? This cannot be undone.`)) return;
            try {
                const res = await api.delete('/organisations/' + org.id + '/');
                if (res?.ok) {
                    this.organisations = this.organisations.filter(o => o.id !== org.id);
                } else {
                    alert('Failed to delete organisation');
                }
            } catch (e) { console.error(e); alert('Error deleting organisation'); }
        }
    }
}
</script>
{% endblock %}
