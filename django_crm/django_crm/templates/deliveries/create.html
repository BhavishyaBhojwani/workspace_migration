{% extends 'layouts/app.html' %}

{% block nav_deliveries %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Create Delivery{% endblock %}

{% block page_content %}
<div x-data="deliveryCreate()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/deliveries/" class="text-gray-500 hover:text-gray-700 mr-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Create Delivery</h1>
        </div>
    </div>
    
    <form @submit.prevent="submit()">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Delivery Details</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Order <span class="text-red-500">*</span></label>
                    <select x-model="form.order_id" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Order</option>
                        <template x-for="order in orders" :key="order.id">
                            <option :value="order.id" x-text="order.order_id"></option>
                        </template>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Delivery Initiated</label>
                    <input type="date" x-model="form.delivery_initiated"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Shipped On</label>
                    <input type="date" x-model="form.shipped_on"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Expected On</label>
                    <input type="date" x-model="form.expected_on"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Delivered On</label>
                    <input type="date" x-model="form.delivered_on"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tracking Number</label>
                    <input type="text" x-model="form.tracking_number"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter tracking number">
                </div>
            </div>
        </div>
        
        <!-- Delivery Products -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800">Products</h2>
                <button type="button" @click="addProduct()"
                    class="px-3 py-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm">
                    <i class="fas fa-plus mr-1"></i> Add Product
                </button>
            </div>
            
            <template x-if="form.products.length === 0">
                <p class="text-gray-500 text-center py-4">No products added</p>
            </template>
            
            <template x-for="(item, index) in form.products" :key="index">
                <div class="border border-gray-200 rounded-lg p-4 mb-4">
                    <div class="flex justify-end mb-2">
                        <button type="button" @click="removeProduct(index)" class="text-red-500 hover:text-red-700">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product</label>
                            <select x-model="item.product_id"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">Select Product</option>
                                <template x-for="product in products" :key="product.id">
                                    <option :value="product.id" x-text="product.name"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                            <input type="number" x-model="item.quantity" min="1"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Comments</label>
                            <input type="text" x-model="item.comments"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>
                </div>
            </template>
        </div>
        
        <!-- Notes -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Notes</h2>
            <textarea x-model="form.notes" rows="3"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                placeholder="Add delivery notes"></textarea>
        </div>
        
        <div class="flex items-center justify-end gap-3">
            <a href="/deliveries/" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" :disabled="submitting"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                Create Delivery
            </button>
        </div>
    </form>
</div>

<script>
function deliveryCreate() {
    return {
        form: {
            order_id: '',
            delivery_initiated: '',
            shipped_on: '',
            expected_on: '',
            delivered_on: '',
            tracking_number: '',
            notes: '',
            products: []
        },
        orders: [],
        products: [],
        submitting: false,
        
        async init() {
            await Promise.all([
                this.loadOrders(),
                this.loadProducts()
            ]);
        },
        
        async loadOrders() {
            try {
                const response = await fetch('/api/v1/sales/orders/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.orders = data.data;
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        },
        
        async loadProducts() {
            try {
                const response = await fetch('/api/v1/products/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.products = data.data;
            } catch (error) {
                console.error('Error loading products:', error);
            }
        },
        
        addProduct() {
            this.form.products.push({
                product_id: '',
                quantity: 1,
                comments: ''
            });
        },
        
        removeProduct(index) {
            this.form.products.splice(index, 1);
        },
        
        async submit() {
            if (!this.form.order_id) {
                alert('Please select an order');
                return;
            }
            
            this.submitting = true;
            try {
                const response = await fetch('/api/v1/sales/deliveries/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(this.form)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/deliveries/' + data.data.id;
                } else {
                    alert(data.message || 'Error creating delivery');
                }
            } catch (error) {
                console.error('Error creating delivery:', error);
                alert('Error creating delivery');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
