{% extends 'layouts/app.html' %}

{% block nav_deliveries %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Edit Delivery{% endblock %}

{% block page_content %}
<div x-data="deliveryEdit()" x-init="init()">
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <template x-if="!loading">
        <div>
            <!-- Header -->
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <a :href="'/deliveries/' + form.id" class="text-gray-500 hover:text-gray-700 mr-3">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1 class="text-2xl font-bold text-gray-800">Edit Delivery</h1>
                </div>
            </div>
            
            <form @submit.prevent="submit()">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Delivery Details</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Order</label>
                            <select x-model="form.order_id"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="">Select Order</option>
                                <template x-for="order in orders" :key="order.id">
                                    <option :value="order.id" x-text="order.order_id"></option>
                                </template>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tracking Number</label>
                            <input type="text" x-model="form.tracking_number"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Delivery Initiated</label>
                            <input type="date" x-model="form.delivery_initiated"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Shipped On</label>
                            <input type="date" x-model="form.shipped_on"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Expected On</label>
                            <input type="date" x-model="form.expected_on"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Delivered On</label>
                            <input type="date" x-model="form.delivered_on"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                    </div>
                </div>
                
                <!-- Notes -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Notes</h2>
                    <textarea x-model="form.notes" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
                
                <div class="flex items-center justify-end gap-3">
                    <a :href="'/deliveries/' + form.id" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Cancel
                    </a>
                    <button type="submit" :disabled="submitting"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                        <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                        Update Delivery
                    </button>
                </div>
            </form>
        </div>
    </template>
</div>

<script>
function deliveryEdit() {
    return {
        form: {
            id: null,
            order_id: '',
            delivery_initiated: '',
            shipped_on: '',
            expected_on: '',
            delivered_on: '',
            tracking_number: '',
            notes: ''
        },
        orders: [],
        loading: true,
        submitting: false,
        
        async init() {
            const id = window.location.pathname.split('/')[2];
            await Promise.all([
                this.loadDelivery(id),
                this.loadOrders()
            ]);
        },
        
        async loadDelivery(id) {
            try {
                const response = await fetch('/api/v1/sales/deliveries/' + id + '/', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) {
                    const d = data.data;
                    this.form = {
                        id: d.id,
                        order_id: d.order_id || '',
                        delivery_initiated: d.delivery_initiated || '',
                        shipped_on: d.shipped_on || '',
                        expected_on: d.expected_on || '',
                        delivered_on: d.delivered_on || '',
                        tracking_number: d.tracking_number || '',
                        notes: d.notes || ''
                    };
                }
            } catch (error) {
                console.error('Error loading delivery:', error);
            }
            this.loading = false;
        },
        
        async loadOrders() {
            try {
                const response = await fetch('/api/v1/sales/orders/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.orders = data.data;
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        },
        
        async submit() {
            this.submitting = true;
            try {
                const response = await fetch('/api/v1/sales/deliveries/' + this.form.id + '/', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(this.form)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/deliveries/' + this.form.id;
                } else {
                    alert(data.message || 'Error updating delivery');
                }
            } catch (error) {
                console.error('Error updating delivery:', error);
                alert('Error updating delivery');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
