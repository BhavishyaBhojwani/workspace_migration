{% extends 'layouts/app.html' %}

{% block nav_users %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Create User{% endblock %}

{% block page_content %}
<div x-data="userCreate()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/users/" class="text-gray-500 hover:text-gray-700 mr-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Create User</h1>
        </div>
    </div>
    
    <form @submit.prevent="submit()">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">User Information</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Name <span class="text-red-500">*</span></label>
                    <input type="text" x-model="form.name" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter full name">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email <span class="text-red-500">*</span></label>
                    <input type="email" x-model="form.email" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter email address">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password <span class="text-red-500">*</span></label>
                    <input type="password" x-model="form.password" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter password">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password <span class="text-red-500">*</span></label>
                    <input type="password" x-model="form.password_confirmation" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Confirm password">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
                    <select x-model="form.role_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Role</option>
                        <template x-for="role in roles" :key="role.id">
                            <option :value="role.id" x-text="role.name"></option>
                        </template>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Team</label>
                    <select x-model="form.team_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Team</option>
                        <template x-for="team in teams" :key="team.id">
                            <option :value="team.id" x-text="team.name"></option>
                        </template>
                    </select>
                </div>
                
                <div class="md:col-span-2">
                    <label class="flex items-center">
                        <input type="checkbox" x-model="form.is_active"
                            class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <span class="ml-2 text-sm text-gray-700">Active</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="flex items-center justify-end gap-3">
            <a href="/users/" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" :disabled="submitting"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                Create User
            </button>
        </div>
    </form>
</div>

<script>
function userCreate() {
    return {
        form: {
            name: '',
            email: '',
            password: '',
            password_confirmation: '',
            role_id: '',
            team_id: '',
            is_active: true
        },
        roles: [],
        teams: [],
        submitting: false,
        
        async init() {
            await Promise.all([
                this.loadRoles(),
                this.loadTeams()
            ]);
        },
        
        async loadRoles() {
            try {
                const response = await fetch('/api/v1/accounts/roles/', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.roles = data.data;
            } catch (error) {
                console.error('Error loading roles:', error);
            }
        },
        
        async loadTeams() {
            try {
                const response = await fetch('/api/v1/accounts/teams/', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.teams = data.data;
            } catch (error) {
                console.error('Error loading teams:', error);
            }
        },
        
        async submit() {
            if (this.form.password !== this.form.password_confirmation) {
                alert('Passwords do not match');
                return;
            }
            
            this.submitting = true;
            try {
                const response = await fetch('/api/v1/accounts/users/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(this.form)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/users/' + data.data.id;
                } else {
                    alert(data.message || 'Error creating user');
                }
            } catch (error) {
                console.error('Error creating user:', error);
                alert('Error creating user');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
