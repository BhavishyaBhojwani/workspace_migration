{% extends 'layouts/app.html' %}

{% block nav_users %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Users{% endblock %}

{% block page_content %}
<div x-data="usersIndex()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Users</h1>
        <a href="/users/create" class="mt-4 sm:mt-0 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
            <i class="fas fa-plus mr-2"></i>
            Add User
        </a>
    </div>
    
    <!-- Search -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" x-model="search" @input.debounce.300ms="loadData()"
                        placeholder="Search users..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            <select x-model="perPage" @change="loadData()"
                class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                <option value="10">10 per page</option>
                <option value="25">25 per page</option>
                <option value="50">50 per page</option>
            </select>
        </div>
    </div>
    
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <!-- Empty State -->
    <template x-if="!loading && users.length === 0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-12 text-center">
            <i class="fas fa-users text-5xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">No users found</p>
            <a href="/users/create" class="mt-4 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                <i class="fas fa-plus mr-2"></i> Add User
            </a>
        </div>
    </template>

    <!-- Mobile Cards -->
    <div x-show="!loading && users.length > 0" class="md:hidden space-y-4">
        <template x-for="user in users" :key="user.id">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center mr-3">
                        <span class="text-indigo-600 font-medium" x-text="getInitials(user)"></span>
                    </div>
                    <div>
                        <a :href="'/users/' + user.id" class="text-indigo-600 hover:text-indigo-800 font-semibold" x-text="user.name"></a>
                        <p class="text-gray-500 text-sm" x-text="user.email"></p>
                    </div>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex items-center justify-between" x-show="user.role">
                        <span class="text-gray-500">Role</span>
                        <span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800" x-text="user.role"></span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-500">Status</span>
                        <span class="px-2 py-1 text-xs rounded-full" 
                            :class="user.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
                            x-text="user.is_active ? 'Active' : 'Inactive'"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>
    
    <!-- Desktop Table -->
    <div x-show="!loading && users.length > 0" class="hidden md:block bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Team</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <template x-for="user in users" :key="user.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center mr-3">
                                        <span class="text-indigo-600 text-sm font-medium" x-text="getInitials(user)"></span>
                                    </div>
                                    <a :href="'/users/' + user.id" class="text-indigo-600 hover:text-indigo-800 font-medium" x-text="user.name"></a>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500" x-text="user.email"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800" x-text="user.role || '-'"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500" x-text="user.team_name || '-'"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs rounded-full" 
                                    :class="user.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
                                    x-text="user.is_active ? 'Active' : 'Inactive'"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                <div class="flex items-center justify-end gap-2">
                                    <a :href="'/users/' + user.id" class="text-gray-500 hover:text-indigo-600" title="View">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a :href="'/users/' + user.id + '/edit'" class="text-gray-500 hover:text-blue-600" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button @click="deleteUser(user)" class="text-gray-500 hover:text-red-600" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Pagination -->
    <div x-show="!loading && meta.last_page > 1" class="mt-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <p class="text-gray-500 text-sm">
            Showing <span x-text="((meta.current_page - 1) * perPage) + 1"></span> to 
            <span x-text="Math.min(meta.current_page * perPage, meta.total)"></span> of 
            <span x-text="meta.total"></span> users
        </p>
        <div class="flex items-center gap-2">
            <button @click="prevPage()" :disabled="meta.current_page === 1"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="text-gray-700">Page <span x-text="meta.current_page"></span> of <span x-text="meta.last_page"></span></span>
            <button @click="nextPage()" :disabled="meta.current_page === meta.last_page"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
function usersIndex() {
    return {
        users: [],
        loading: true,
        search: '',
        perPage: 25,
        meta: {
            current_page: 1,
            last_page: 1,
            total: 0
        },
        
        async init() {
            await this.loadData();
        },
        
        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.meta.current_page,
                    per_page: this.perPage,
                    search: this.search
                });
                
                const response = await fetch('/api/v1/accounts/users/?' + params.toString(), {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    this.users = data.data;
                    this.meta = data.meta;
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
            this.loading = false;
        },
        
        async deleteUser(user) {
            if (!confirm(`Delete user "${user.name}"?`)) return;
            
            try {
                const response = await fetch('/api/v1/accounts/users/' + user.id + '/', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    await this.loadData();
                }
            } catch (error) {
                console.error('Error deleting user:', error);
            }
        },
        
        getInitials(user) {
            const name = user.name || user.email || '';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        },
        
        prevPage() {
            if (this.meta.current_page > 1) {
                this.meta.current_page--;
                this.loadData();
            }
        },
        
        nextPage() {
            if (this.meta.current_page < this.meta.last_page) {
                this.meta.current_page++;
                this.loadData();
            }
        }
    }
}
</script>
{% endblock %}
