{% extends 'layouts/app.html' %}

{% block nav_invoices %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Create Invoice{% endblock %}

{% block page_content %}
<div x-data="invoiceCreate()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/invoices/" class="text-gray-500 hover:text-gray-700 mr-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Create Invoice</h1>
        </div>
    </div>
    
    <form @submit.prevent="submit()">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Invoice Details</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Reference</label>
                    <input type="text" x-model="form.reference"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter reference">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Currency</label>
                    <select x-model="form.currency"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="INR">INR</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Person</label>
                    <select x-model="form.person_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Person</option>
                        <template x-for="person in people" :key="person.id">
                            <option :value="person.id" x-text="person.name"></option>
                        </template>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Organisation</label>
                    <select x-model="form.organisation_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Organisation</option>
                        <template x-for="org in organisations" :key="org.id">
                            <option :value="org.id" x-text="org.name"></option>
                        </template>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Issue Date</label>
                    <input type="date" x-model="form.issue_date"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Due Date</label>
                    <input type="date" x-model="form.due_date"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Order</label>
                    <select x-model="form.order_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Order</option>
                        <template x-for="order in orders" :key="order.id">
                            <option :value="order.id" x-text="order.order_id"></option>
                        </template>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Invoice Lines -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800">Line Items</h2>
                <button type="button" @click="addLine()"
                    class="px-3 py-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm">
                    <i class="fas fa-plus mr-1"></i> Add Line
                </button>
            </div>
            
            <template x-if="form.lines.length === 0">
                <p class="text-gray-500 text-center py-4">No line items added</p>
            </template>
            
            <template x-for="(line, index) in form.lines" :key="index">
                <div class="border border-gray-200 rounded-lg p-4 mb-4">
                    <div class="flex justify-end mb-2">
                        <button type="button" @click="removeLine(index)" class="text-red-500 hover:text-red-700">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <input type="text" x-model="line.description"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Price</label>
                            <input type="number" x-model="line.price" step="0.01"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                @input="calculateTotal()">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                            <input type="number" x-model="line.quantity" min="1"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                @input="calculateTotal()">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
                            <input type="text" :value="formatCurrency(line.price * line.quantity)" readonly
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50">
                        </div>
                    </div>
                </div>
            </template>
            
            <!-- Totals -->
            <div class="border-t border-gray-200 pt-4 mt-4">
                <div class="flex justify-end">
                    <div class="w-64 space-y-2">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Subtotal:</span>
                            <span class="font-medium" x-text="formatCurrency(totals.subtotal)"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">Tax:</span>
                            <span class="font-medium" x-text="formatCurrency(totals.tax)"></span>
                        </div>
                        <div class="flex justify-between text-lg font-bold">
                            <span>Total:</span>
                            <span x-text="formatCurrency(totals.total)"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Terms -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Terms & Conditions</h2>
            <textarea x-model="form.terms" rows="4"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                placeholder="Enter terms and conditions"></textarea>
        </div>
        
        <div class="flex items-center justify-end gap-3">
            <a href="/invoices/" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" :disabled="submitting"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                Create Invoice
            </button>
        </div>
    </form>
</div>

<script>
function invoiceCreate() {
    return {
        form: {
            reference: '',
            person_id: '',
            organisation_id: '',
            order_id: '',
            currency: 'USD',
            issue_date: new Date().toISOString().split('T')[0],
            due_date: '',
            terms: '',
            lines: []
        },
        totals: {
            subtotal: 0,
            tax: 0,
            total: 0
        },
        people: [],
        organisations: [],
        orders: [],
        submitting: false,
        
        async init() {
            await Promise.all([
                this.loadPeople(),
                this.loadOrganisations(),
                this.loadOrders()
            ]);
            
            // Set default due date to 30 days from now
            const dueDate = new Date();
            dueDate.setDate(dueDate.getDate() + 30);
            this.form.due_date = dueDate.toISOString().split('T')[0];
        },
        
        async loadPeople() {
            try {
                const response = await fetch('/api/v1/crm/people/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.people = data.data;
            } catch (error) {
                console.error('Error loading people:', error);
            }
        },
        
        async loadOrganisations() {
            try {
                const response = await fetch('/api/v1/crm/organisations/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.organisations = data.data;
            } catch (error) {
                console.error('Error loading organisations:', error);
            }
        },
        
        async loadOrders() {
            try {
                const response = await fetch('/api/v1/sales/orders/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.orders = data.data;
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        },
        
        addLine() {
            this.form.lines.push({
                description: '',
                price: 0,
                quantity: 1,
                tax_rate: 0
            });
        },
        
        removeLine(index) {
            this.form.lines.splice(index, 1);
            this.calculateTotal();
        },
        
        calculateTotal() {
            this.totals.subtotal = this.form.lines.reduce((sum, l) => sum + (l.price * l.quantity), 0);
            this.totals.tax = 0;
            this.totals.total = this.totals.subtotal + this.totals.tax;
        },
        
        formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: this.form.currency
            }).format(amount || 0);
        },
        
        async submit() {
            this.submitting = true;
            try {
                const payload = {
                    ...this.form,
                    subtotal: Math.round(this.totals.subtotal * 100),
                    tax: Math.round(this.totals.tax * 100),
                    total: Math.round(this.totals.total * 100),
                    amount_due: Math.round(this.totals.total * 100)
                };
                
                const response = await fetch('/api/v1/sales/invoices/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/invoices/' + data.data.id;
                } else {
                    alert(data.message || 'Error creating invoice');
                }
            } catch (error) {
                console.error('Error creating invoice:', error);
                alert('Error creating invoice');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
