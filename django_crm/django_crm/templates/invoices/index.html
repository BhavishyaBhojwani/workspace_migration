{% extends 'layouts/app.html' %}

{% block nav_invoices %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Invoices{% endblock %}

{% block page_content %}
<div x-data="invoicesIndex()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Invoices</h1>
        <a href="/invoices/create" class="mt-4 sm:mt-0 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
            <i class="fas fa-plus mr-2"></i>
            Add Invoice
        </a>
    </div>
    
    <!-- Search and Filters -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" x-model="search" @input.debounce.300ms="loadData()"
                        placeholder="Search invoices..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select x-model="filters.status" @change="loadData()"
                    class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                    <option value="">All</option>
                    <option value="unpaid">Unpaid</option>
                    <option value="paid">Paid</option>
                    <option value="overdue">Overdue</option>
                </select>
                <select x-model="perPage" @change="loadData()"
                    class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                    <option value="10">10 per page</option>
                    <option value="25">25 per page</option>
                    <option value="50">50 per page</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <!-- Empty State -->
    <template x-if="!loading && invoices.length === 0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-12 text-center">
            <i class="fas fa-file-invoice text-5xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">No invoices found</p>
            <a href="/invoices/create" class="mt-4 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                <i class="fas fa-plus mr-2"></i> Add Invoice
            </a>
        </div>
    </template>

    <!-- Mobile Cards -->
    <div x-show="!loading && invoices.length > 0" class="md:hidden space-y-4">
        <template x-for="invoice in invoices" :key="invoice.id">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                <div class="flex items-start justify-between mb-3">
                    <div>
                        <a :href="'/invoices/' + invoice.id" class="text-indigo-600 hover:text-indigo-800 font-semibold text-lg" x-text="invoice.invoice_id"></a>
                        <p class="text-gray-500 text-sm" x-text="invoice.reference"></p>
                    </div>
                    <span class="px-2 py-1 text-xs rounded-full" :class="getStatusClass(invoice)" x-text="getStatusText(invoice)"></span>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex items-center" x-show="invoice.organisation_name">
                        <i class="fas fa-building w-5 text-gray-400"></i>
                        <span class="text-gray-600 ml-2" x-text="invoice.organisation_name"></span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-500">Total</span>
                        <span class="font-medium" x-text="formatCurrency(invoice.total, invoice.currency)"></span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-500">Due</span>
                        <span class="font-medium" :class="isOverdue(invoice) ? 'text-red-600' : ''" x-text="formatDate(invoice.due_date)"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>
    
    <!-- Desktop Table -->
    <div x-show="!loading && invoices.length > 0" class="hidden md:block bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Invoice</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Organisation</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Amount Due</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Due Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <template x-for="invoice in invoices" :key="invoice.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a :href="'/invoices/' + invoice.id" class="text-indigo-600 hover:text-indigo-800 font-medium" x-text="invoice.invoice_id"></a>
                                <p class="text-gray-500 text-sm" x-text="invoice.reference || '-'"></p>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="text-gray-700" x-text="invoice.organisation_name || '-'"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="text-gray-700 font-medium" x-text="formatCurrency(invoice.total, invoice.currency)"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="text-gray-700" x-text="formatCurrency(invoice.amount_due, invoice.currency)"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span :class="isOverdue(invoice) ? 'text-red-600 font-medium' : 'text-gray-500'" x-text="formatDate(invoice.due_date)"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs rounded-full" :class="getStatusClass(invoice)" x-text="getStatusText(invoice)"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                <div class="flex items-center justify-end gap-2">
                                    <a :href="'/invoices/' + invoice.id" class="text-gray-500 hover:text-indigo-600" title="View">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a :href="'/invoices/' + invoice.id + '/edit'" class="text-gray-500 hover:text-blue-600" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button @click="markAsPaid(invoice)" x-show="!invoice.fully_paid_at" class="text-gray-500 hover:text-green-600" title="Mark as Paid">
                                        <i class="fas fa-check-circle"></i>
                                    </button>
                                    <button @click="deleteInvoice(invoice)" class="text-gray-500 hover:text-red-600" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Pagination -->
    <div x-show="!loading && meta.last_page > 1" class="mt-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <p class="text-gray-500 text-sm">
            Showing <span x-text="((meta.current_page - 1) * perPage) + 1"></span> to 
            <span x-text="Math.min(meta.current_page * perPage, meta.total)"></span> of 
            <span x-text="meta.total"></span> invoices
        </p>
        <div class="flex items-center gap-2">
            <button @click="prevPage()" :disabled="meta.current_page === 1"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="text-gray-700">Page <span x-text="meta.current_page"></span> of <span x-text="meta.last_page"></span></span>
            <button @click="nextPage()" :disabled="meta.current_page === meta.last_page"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
function invoicesIndex() {
    return {
        invoices: [],
        loading: true,
        search: '',
        filters: {
            status: ''
        },
        perPage: 25,
        meta: {
            current_page: 1,
            last_page: 1,
            total: 0
        },
        
        async init() {
            await this.loadData();
        },
        
        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.meta.current_page,
                    per_page: this.perPage,
                    search: this.search
                });
                
                if (this.filters.status) {
                    params.append('status', this.filters.status);
                }
                
                const response = await fetch('/api/v1/sales/invoices/?' + params.toString(), {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    this.invoices = data.data;
                    this.meta = data.meta;
                }
            } catch (error) {
                console.error('Error loading invoices:', error);
            }
            this.loading = false;
        },
        
        async markAsPaid(invoice) {
            if (!confirm(`Mark invoice "${invoice.invoice_id}" as paid?`)) return;
            
            try {
                const response = await fetch('/api/v1/sales/invoices/' + invoice.id + '/mark-paid/', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    await this.loadData();
                }
            } catch (error) {
                console.error('Error marking invoice as paid:', error);
            }
        },
        
        async deleteInvoice(invoice) {
            if (!confirm(`Delete invoice "${invoice.invoice_id}"?`)) return;
            
            try {
                const response = await fetch('/api/v1/sales/invoices/' + invoice.id + '/', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    await this.loadData();
                }
            } catch (error) {
                console.error('Error deleting invoice:', error);
            }
        },
        
        isOverdue(invoice) {
            if (invoice.fully_paid_at) return false;
            if (!invoice.due_date) return false;
            return new Date(invoice.due_date) < new Date();
        },
        
        getStatusText(invoice) {
            if (invoice.fully_paid_at) return 'Paid';
            if (this.isOverdue(invoice)) return 'Overdue';
            return 'Unpaid';
        },
        
        getStatusClass(invoice) {
            const status = this.getStatusText(invoice).toLowerCase();
            if (status === 'paid') return 'bg-green-100 text-green-800';
            if (status === 'overdue') return 'bg-red-100 text-red-800';
            return 'bg-yellow-100 text-yellow-800';
        },
        
        prevPage() {
            if (this.meta.current_page > 1) {
                this.meta.current_page--;
                this.loadData();
            }
        },
        
        nextPage() {
            if (this.meta.current_page < this.meta.last_page) {
                this.meta.current_page++;
                this.loadData();
            }
        },
        
        formatDate(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleDateString();
        },
        
        formatCurrency(amount, currency) {
            if (amount === null || amount === undefined) return '-';
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: currency || 'USD'
            }).format(amount / 100);
        }
    }
}
</script>
{% endblock %}
