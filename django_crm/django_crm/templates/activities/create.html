{% extends 'layouts/app.html' %}

{% block nav_activities %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Create Task{% endblock %}

{% block page_content %}
<div x-data="taskCreate()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/activities/" class="text-gray-500 hover:text-gray-700 mr-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Create Task</h1>
        </div>
    </div>
    
    <form @submit.prevent="submit()">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Task Details</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Name <span class="text-red-500">*</span></label>
                    <input type="text" x-model="form.name" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter task name">
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea x-model="form.description" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter task description"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Due Date</label>
                    <input type="datetime-local" x-model="form.due_at"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Assign To</label>
                    <select x-model="form.user_assigned_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select User</option>
                        <template x-for="user in users" :key="user.id">
                            <option :value="user.id" x-text="user.name"></option>
                        </template>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Related To</label>
                    <select x-model="form.related_type" @change="loadRelatedRecords()"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">None</option>
                        <option value="lead">Lead</option>
                        <option value="deal">Deal</option>
                        <option value="person">Person</option>
                        <option value="organisation">Organisation</option>
                    </select>
                </div>
                
                <div x-show="form.related_type">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Select Record</label>
                    <select x-model="form.related_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select...</option>
                        <template x-for="record in relatedRecords" :key="record.id">
                            <option :value="record.id" x-text="record.name || record.title"></option>
                        </template>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Reminders -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Reminders</h2>
            
            <div class="space-y-4">
                <label class="flex items-center">
                    <input type="checkbox" x-model="form.reminder_email"
                        class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    <span class="ml-2 text-gray-700">Send email reminder</span>
                </label>
                
                <label class="flex items-center">
                    <input type="checkbox" x-model="form.reminder_sms"
                        class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    <span class="ml-2 text-gray-700">Send SMS reminder</span>
                </label>
            </div>
        </div>
        
        <div class="flex items-center justify-end gap-3">
            <a href="/activities/" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" :disabled="submitting"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                Create Task
            </button>
        </div>
    </form>
</div>

<script>
function taskCreate() {
    return {
        form: {
            name: '',
            description: '',
            due_at: '',
            user_assigned_id: '',
            related_type: '',
            related_id: '',
            reminder_email: false,
            reminder_sms: false
        },
        users: [],
        relatedRecords: [],
        submitting: false,
        
        async init() {
            await this.loadUsers();
        },
        
        async loadUsers() {
            try {
                const response = await fetch('/api/v1/accounts/users/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.users = data.data;
            } catch (error) {
                console.error('Error loading users:', error);
            }
        },
        
        async loadRelatedRecords() {
            this.form.related_id = '';
            this.relatedRecords = [];
            
            if (!this.form.related_type) return;
            
            let endpoint;
            switch (this.form.related_type) {
                case 'lead': endpoint = '/api/v1/crm/leads/'; break;
                case 'deal': endpoint = '/api/v1/crm/deals/'; break;
                case 'person': endpoint = '/api/v1/crm/people/'; break;
                case 'organisation': endpoint = '/api/v1/crm/organisations/'; break;
            }
            
            try {
                const response = await fetch(endpoint + '?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.relatedRecords = data.data;
            } catch (error) {
                console.error('Error loading records:', error);
            }
        },
        
        async submit() {
            this.submitting = true;
            try {
                const payload = { ...this.form };
                
                // Map related type to taskable fields
                if (this.form.related_type && this.form.related_id) {
                    payload.taskable_type = this.form.related_type;
                    payload.taskable_id = this.form.related_id;
                }
                
                const response = await fetch('/api/v1/activities/tasks/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/activities/' + data.data.id;
                } else {
                    alert(data.message || 'Error creating task');
                }
            } catch (error) {
                console.error('Error creating task:', error);
                alert('Error creating task');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
