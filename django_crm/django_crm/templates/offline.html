{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline - Django CRM</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="text-center px-4">
        <!-- App Logo -->
        <div class="mb-8">
            <div class="w-24 h-24 mx-auto bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg mb-4">
                <i class="fas fa-briefcase text-white text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Django CRM</h1>
        </div>
        
        <!-- Offline Message -->
        <div class="bg-white rounded-xl shadow-lg p-8 max-w-md mx-auto">
            <div class="w-16 h-16 mx-auto bg-yellow-100 rounded-full flex items-center justify-center mb-4 pulse-animation">
                <i class="fas fa-wifi-slash text-yellow-600 text-2xl"></i>
            </div>
            
            <h2 class="text-xl font-semibold text-gray-800 mb-2">You are offline</h2>
            <p class="text-gray-600 mb-6">
                It seems you've lost your internet connection. Some features may be unavailable while offline.
            </p>
            
            <!-- Retry Button -->
            <button onclick="checkConnection()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-lg transition duration-200 flex items-center justify-center gap-2">
                <i class="fas fa-sync-alt"></i>
                <span>Try Again</span>
            </button>
            
            <!-- Cached Pages Info -->
            <div class="mt-6 pt-6 border-t border-gray-200">
                <p class="text-sm text-gray-500 mb-3">Available offline:</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">
                        <i class="fas fa-home mr-1"></i> Dashboard
                    </span>
                    <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">
                        <i class="fas fa-user-friends mr-1"></i> Leads
                    </span>
                    <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">
                        <i class="fas fa-handshake mr-1"></i> Deals
                    </span>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <p class="mt-8 text-gray-500 text-sm">
            <i class="fas fa-info-circle mr-1"></i>
            Data will sync automatically when you reconnect
        </p>
    </div>
    
    <script>
        function checkConnection() {
            // Show loading state
            const btn = document.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
            btn.disabled = true;
            
            // Try to fetch a small resource
            fetch('/static/manifest.json', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    // Connection restored
                    window.location.href = '/dashboard/';
                })
                .catch(() => {
                    // Still offline
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    alert('Still offline. Please check your internet connection.');
                });
        }
        
        // Auto-check connection periodically
        setInterval(() => {
            if (navigator.onLine) {
                window.location.href = '/dashboard/';
            }
        }, 5000);
        
        // Listen for online event
        window.addEventListener('online', () => {
            window.location.href = '/dashboard/';
        });
    </script>
</body>
</html>
