{% extends 'layouts/app.html' %}

{% block nav_teams %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Teams{% endblock %}

{% block page_content %}
<div x-data="teamsIndex()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Teams</h1>
        <a href="/teams/create" class="mt-4 sm:mt-0 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
            <i class="fas fa-plus mr-2"></i>
            Add Team
        </a>
    </div>
    
    <!-- Search -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" x-model="search" @input.debounce.300ms="loadData()"
                        placeholder="Search teams..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <!-- Empty State -->
    <template x-if="!loading && teams.length === 0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-12 text-center">
            <i class="fas fa-users-cog text-5xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">No teams found</p>
            <a href="/teams/create" class="mt-4 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                <i class="fas fa-plus mr-2"></i> Add Team
            </a>
        </div>
    </template>

    <!-- Teams Grid -->
    <div x-show="!loading && teams.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="team in teams" :key="team.id">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center">
                        <div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center mr-3">
                            <i class="fas fa-users text-indigo-600"></i>
                        </div>
                        <div>
                            <a :href="'/teams/' + team.id" class="text-indigo-600 hover:text-indigo-800 font-semibold text-lg" x-text="team.name"></a>
                            <p class="text-gray-500 text-sm" x-text="(team.members_count || 0) + ' members'"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <a :href="'/teams/' + team.id + '/edit'" class="text-gray-400 hover:text-blue-600 p-1" title="Edit">
                            <i class="fas fa-edit"></i>
                        </a>
                        <button @click="deleteTeam(team)" class="text-gray-400 hover:text-red-600 p-1" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                <p class="text-gray-600 text-sm mb-4" x-text="team.description || 'No description'"></p>
                <div class="flex items-center text-sm text-gray-500">
                    <i class="fas fa-user mr-2"></i>
                    <span>Manager: </span>
                    <span class="ml-1 font-medium" x-text="team.manager_name || '-'"></span>
                </div>
            </div>
        </template>
    </div>
    
    <!-- Pagination -->
    <div x-show="!loading && meta.last_page > 1" class="mt-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <p class="text-gray-500 text-sm">
            Showing <span x-text="((meta.current_page - 1) * perPage) + 1"></span> to 
            <span x-text="Math.min(meta.current_page * perPage, meta.total)"></span> of 
            <span x-text="meta.total"></span> teams
        </p>
        <div class="flex items-center gap-2">
            <button @click="prevPage()" :disabled="meta.current_page === 1"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="text-gray-700">Page <span x-text="meta.current_page"></span> of <span x-text="meta.last_page"></span></span>
            <button @click="nextPage()" :disabled="meta.current_page === meta.last_page"
                class="px-3 py-1 border border-gray-300 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
function teamsIndex() {
    return {
        teams: [],
        loading: true,
        search: '',
        perPage: 25,
        meta: {
            current_page: 1,
            last_page: 1,
            total: 0
        },
        
        async init() {
            await this.loadData();
        },
        
        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.meta.current_page,
                    per_page: this.perPage,
                    search: this.search
                });
                
                const response = await fetch('/api/v1/accounts/teams/?' + params.toString(), {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    this.teams = data.data;
                    this.meta = data.meta;
                }
            } catch (error) {
                console.error('Error loading teams:', error);
            }
            this.loading = false;
        },
        
        async deleteTeam(team) {
            if (!confirm(`Delete team "${team.name}"?`)) return;
            
            try {
                const response = await fetch('/api/v1/accounts/teams/' + team.id + '/', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    await this.loadData();
                }
            } catch (error) {
                console.error('Error deleting team:', error);
            }
        },
        
        prevPage() {
            if (this.meta.current_page > 1) {
                this.meta.current_page--;
                this.loadData();
            }
        },
        
        nextPage() {
            if (this.meta.current_page < this.meta.last_page) {
                this.meta.current_page++;
                this.loadData();
            }
        }
    }
}
</script>
{% endblock %}
