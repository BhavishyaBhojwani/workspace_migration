{% extends 'layouts/app.html' %}

{% block nav_teams %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Create Team{% endblock %}

{% block page_content %}
<div x-data="teamCreate()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/teams/" class="text-gray-500 hover:text-gray-700 mr-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Create Team</h1>
        </div>
    </div>
    
    <form @submit.prevent="submit()">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Team Information</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Name <span class="text-red-500">*</span></label>
                    <input type="text" x-model="form.name" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter team name">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Manager</label>
                    <select x-model="form.manager_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Manager</option>
                        <template x-for="user in users" :key="user.id">
                            <option :value="user.id" x-text="user.name"></option>
                        </template>
                    </select>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea x-model="form.description" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter team description"></textarea>
                </div>
            </div>
        </div>
        
        <!-- Team Members -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Team Members</h2>
            <div class="space-y-2">
                <template x-for="user in users" :key="user.id">
                    <label class="flex items-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer">
                        <input type="checkbox" :value="user.id" x-model="form.members"
                            class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <div class="ml-3">
                            <p class="font-medium text-gray-700" x-text="user.name"></p>
                            <p class="text-gray-500 text-sm" x-text="user.email"></p>
                        </div>
                    </label>
                </template>
            </div>
        </div>
        
        <div class="flex items-center justify-end gap-3">
            <a href="/teams/" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" :disabled="submitting"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                Create Team
            </button>
        </div>
    </form>
</div>

<script>
function teamCreate() {
    return {
        form: {
            name: '',
            description: '',
            manager_id: '',
            members: []
        },
        users: [],
        submitting: false,
        
        async init() {
            await this.loadUsers();
        },
        
        async loadUsers() {
            try {
                const response = await fetch('/api/v1/accounts/users/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.users = data.data;
            } catch (error) {
                console.error('Error loading users:', error);
            }
        },
        
        async submit() {
            if (!this.form.name) {
                alert('Please enter a team name');
                return;
            }
            
            this.submitting = true;
            try {
                const response = await fetch('/api/v1/accounts/teams/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(this.form)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/teams/' + data.data.id;
                } else {
                    alert(data.message || 'Error creating team');
                }
            } catch (error) {
                console.error('Error creating team:', error);
                alert('Error creating team');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
