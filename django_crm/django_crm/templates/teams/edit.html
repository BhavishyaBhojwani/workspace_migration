{% extends 'layouts/app.html' %}

{% block nav_teams %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Edit Team{% endblock %}

{% block page_content %}
<div x-data="teamEdit()" x-init="init()">
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <template x-if="!loading">
        <div>
            <!-- Header -->
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <a :href="'/teams/' + form.id" class="text-gray-500 hover:text-gray-700 mr-3">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1 class="text-2xl font-bold text-gray-800">Edit Team</h1>
                </div>
            </div>
            
            <form @submit.prevent="submit()">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Team Information</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Name <span class="text-red-500">*</span></label>
                            <input type="text" x-model="form.name" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Manager</label>
                            <select x-model="form.manager_id"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="">Select Manager</option>
                                <template x-for="user in users" :key="user.id">
                                    <option :value="user.id" x-text="user.name"></option>
                                </template>
                            </select>
                        </div>
                        
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                            <textarea x-model="form.description" rows="3"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- Team Members -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Team Members</h2>
                    <div class="space-y-2">
                        <template x-for="user in users" :key="user.id">
                            <label class="flex items-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer">
                                <input type="checkbox" :value="user.id" x-model="form.members"
                                    class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <div class="ml-3">
                                    <p class="font-medium text-gray-700" x-text="user.name"></p>
                                    <p class="text-gray-500 text-sm" x-text="user.email"></p>
                                </div>
                            </label>
                        </template>
                    </div>
                </div>
                
                <div class="flex items-center justify-end gap-3">
                    <a :href="'/teams/' + form.id" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Cancel
                    </a>
                    <button type="submit" :disabled="submitting"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                        <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                        Update Team
                    </button>
                </div>
            </form>
        </div>
    </template>
</div>

<script>
function teamEdit() {
    return {
        form: {
            id: null,
            name: '',
            description: '',
            manager_id: '',
            members: []
        },
        users: [],
        loading: true,
        submitting: false,
        
        async init() {
            const id = window.location.pathname.split('/')[2];
            await Promise.all([
                this.loadTeam(id),
                this.loadUsers()
            ]);
        },
        
        async loadTeam(id) {
            try {
                const response = await fetch('/api/v1/accounts/teams/' + id + '/', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) {
                    const t = data.data;
                    this.form = {
                        id: t.id,
                        name: t.name || '',
                        description: t.description || '',
                        manager_id: t.manager_id || '',
                        members: t.members?.map(m => m.id) || []
                    };
                }
            } catch (error) {
                console.error('Error loading team:', error);
            }
            this.loading = false;
        },
        
        async loadUsers() {
            try {
                const response = await fetch('/api/v1/accounts/users/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.users = data.data;
            } catch (error) {
                console.error('Error loading users:', error);
            }
        },
        
        async submit() {
            this.submitting = true;
            try {
                const response = await fetch('/api/v1/accounts/teams/' + this.form.id + '/', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(this.form)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/teams/' + this.form.id;
                } else {
                    alert(data.message || 'Error updating team');
                }
            } catch (error) {
                console.error('Error updating team:', error);
                alert('Error updating team');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
