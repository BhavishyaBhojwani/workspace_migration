{% extends 'layouts/app.html' %}

{% block nav_purchase_orders %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Purchase Order Details{% endblock %}

{% block page_content %}
<div x-data="purchaseOrderShow()" x-init="init()">
    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-12">
        <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
    
    <template x-if="!loading && purchaseOrder">
        <div>
            <!-- Header -->
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
                <div class="flex items-center">
                    <a href="/purchase-orders/" class="text-gray-500 hover:text-gray-700 mr-3">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800" x-text="purchaseOrder.purchase_order_id"></h1>
                        <p class="text-gray-500" x-text="purchaseOrder.reference"></p>
                    </div>
                </div>
                <div class="flex items-center gap-2 mt-4 sm:mt-0">
                    <a :href="'/purchase-orders/' + purchaseOrder.id + '/edit'" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-edit mr-2"></i> Edit
                    </a>
                    <button @click="deletePO()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                        <i class="fas fa-trash mr-2"></i> Delete
                    </button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Main Details -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- PO Info -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                        <h2 class="text-lg font-semibold text-gray-800 mb-4">Purchase Order Information</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-500">PO Number</p>
                                <p class="font-medium" x-text="purchaseOrder.purchase_order_id"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Reference</p>
                                <p class="font-medium" x-text="purchaseOrder.reference || '-'"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Delivery Type</p>
                                <span class="px-2 py-1 text-xs rounded-full" 
                                    :class="purchaseOrder.delivery_type === 'pickup' ? 'bg-orange-100 text-orange-800' : 'bg-blue-100 text-blue-800'"
                                    x-text="purchaseOrder.delivery_type || '-'"></span>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Expected Delivery</p>
                                <p class="font-medium" x-text="formatDate(purchaseOrder.expected_delivery)"></p>
                            </div>
                        </div>
                        <div class="mt-4" x-show="purchaseOrder.delivery_instructions">
                            <p class="text-sm text-gray-500">Delivery Instructions</p>
                            <p class="text-gray-700" x-text="purchaseOrder.delivery_instructions"></p>
                        </div>
                    </div>
                    
                    <!-- Line Items -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                        <h2 class="text-lg font-semibold text-gray-800 mb-4">Line Items</h2>
                        <div class="overflow-x-auto">
                            <table class="min-w-full">
                                <thead>
                                    <tr class="border-b border-gray-200">
                                        <th class="text-left py-2 text-sm font-medium text-gray-500">Product</th>
                                        <th class="text-right py-2 text-sm font-medium text-gray-500">Unit Price</th>
                                        <th class="text-right py-2 text-sm font-medium text-gray-500">Qty</th>
                                        <th class="text-right py-2 text-sm font-medium text-gray-500">Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="line in purchaseOrder.lines" :key="line.id">
                                        <tr class="border-b border-gray-100">
                                            <td class="py-3" x-text="line.product_name || 'Product'"></td>
                                            <td class="py-3 text-right" x-text="formatCurrency(line.unit_price)"></td>
                                            <td class="py-3 text-right" x-text="line.quantity"></td>
                                            <td class="py-3 text-right font-medium" x-text="formatCurrency(line.amount)"></td>
                                        </tr>
                                    </template>
                                </tbody>
                                <tfoot>
                                    <tr class="border-t border-gray-200">
                                        <td colspan="3" class="py-2 text-right text-gray-500">Subtotal:</td>
                                        <td class="py-2 text-right font-medium" x-text="formatCurrency(purchaseOrder.subtotal)"></td>
                                    </tr>
                                    <tr>
                                        <td colspan="3" class="py-2 text-right text-gray-500">Tax:</td>
                                        <td class="py-2 text-right font-medium" x-text="formatCurrency(purchaseOrder.tax)"></td>
                                    </tr>
                                    <tr class="text-lg">
                                        <td colspan="3" class="py-2 text-right font-bold">Total:</td>
                                        <td class="py-2 text-right font-bold" x-text="formatCurrency(purchaseOrder.total)"></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- Sidebar -->
                <div class="space-y-6">
                    <!-- Total Card -->
                    <div class="bg-indigo-600 rounded-xl shadow-sm p-6 text-white">
                        <p class="text-white/80">Total Value</p>
                        <p class="text-3xl font-bold" x-text="formatCurrency(purchaseOrder.total)"></p>
                    </div>
                    
                    <!-- Supplier -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                        <h2 class="text-lg font-semibold text-gray-800 mb-4">Supplier</h2>
                        <div class="space-y-3">
                            <div class="flex items-center" x-show="purchaseOrder.person_name">
                                <i class="fas fa-user w-8 text-gray-400"></i>
                                <a :href="'/people/' + purchaseOrder.person_id" class="text-indigo-600 hover:text-indigo-800" x-text="purchaseOrder.person_name"></a>
                            </div>
                            <div class="flex items-center" x-show="purchaseOrder.organisation_name">
                                <i class="fas fa-building w-8 text-gray-400"></i>
                                <a :href="'/organisations/' + purchaseOrder.organisation_id" class="text-indigo-600 hover:text-indigo-800" x-text="purchaseOrder.organisation_name"></a>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Timeline -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                        <h2 class="text-lg font-semibold text-gray-800 mb-4">Timeline</h2>
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">Created</span>
                                <span class="font-medium" x-text="formatDateTime(purchaseOrder.created_at)"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">Updated</span>
                                <span class="font-medium" x-text="formatDateTime(purchaseOrder.updated_at)"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function purchaseOrderShow() {
    return {
        purchaseOrder: null,
        loading: true,
        
        async init() {
            const id = window.location.pathname.split('/')[2];
            await this.loadPO(id);
        },
        
        async loadPO(id) {
            this.loading = true;
            try {
                const response = await fetch('/api/v1/purchasing/purchase-orders/' + id + '/', {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    this.purchaseOrder = data.data;
                }
            } catch (error) {
                console.error('Error loading purchase order:', error);
            }
            this.loading = false;
        },
        
        async deletePO() {
            if (!confirm('Delete this purchase order?')) return;
            try {
                const response = await fetch('/api/v1/purchasing/purchase-orders/' + this.purchaseOrder.id + '/', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    }
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/purchase-orders/';
                }
            } catch (error) {
                console.error('Error deleting purchase order:', error);
            }
        },
        
        formatDate(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleDateString();
        },
        
        formatDateTime(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleString();
        },
        
        formatCurrency(amount) {
            if (amount === null || amount === undefined) return '-';
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: this.purchaseOrder?.currency || 'USD'
            }).format(amount / 100);
        }
    }
}
</script>
{% endblock %}
