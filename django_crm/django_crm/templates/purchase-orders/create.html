{% extends 'layouts/app.html' %}

{% block nav_purchase_orders %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Create Purchase Order{% endblock %}

{% block page_content %}
<div x-data="purchaseOrderCreate()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/purchase-orders/" class="text-gray-500 hover:text-gray-700 mr-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Create Purchase Order</h1>
        </div>
    </div>
    
    <form @submit.prevent="submit()">
        <div x-data="{ open: true }" class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6">
            <div @click="open = !open" class="flex items-center justify-between p-6 cursor-pointer hover:bg-gray-50 transition-colors">
                <h2 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-file-invoice text-indigo-500 mr-2"></i>Purchase Order Details
                </h2>
                <i class="fas transition-transform duration-200" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </div>
            <div x-show="open" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform -translate-y-2" x-transition:enter-end="opacity-100 transform translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 transform translate-y-0" x-transition:leave-end="opacity-0 transform -translate-y-2" class="px-6 pb-6 border-t border-gray-200">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Reference</label>
                    <input type="text" x-model="form.reference"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter reference">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Currency</label>
                    <select x-model="form.currency"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="INR">INR</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Supplier (Person)</label>
                    <select x-model="form.person_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Person</option>
                        <template x-for="person in people" :key="person.id">
                            <option :value="person.id" x-text="person.name"></option>
                        </template>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Supplier (Organisation)</label>
                    <select x-model="form.organisation_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select Organisation</option>
                        <template x-for="org in organisations" :key="org.id">
                            <option :value="org.id" x-text="org.name"></option>
                        </template>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Delivery Type</label>
                    <select x-model="form.delivery_type"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="deliver">Deliver</option>
                        <option value="pickup">Pickup</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Expected Delivery</label>
                    <input type="date" x-model="form.expected_delivery"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            
            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Delivery Instructions</label>
                <textarea x-model="form.delivery_instructions" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Enter delivery instructions"></textarea>
            </div>
            </div>
        </div>
        
        <!-- Line Items -->
        <div x-data="{ open: true }" class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6">
            <div @click="open = !open" class="flex items-center justify-between p-6 cursor-pointer hover:bg-gray-50 transition-colors">
                <h2 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-list-ol text-indigo-500 mr-2"></i>Line Items
                </h2>
                <div class="flex items-center gap-2">
                    <button type="button" @click.stop="addLine()"
                        class="px-3 py-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm">
                        <i class="fas fa-plus mr-1"></i> Add Line
                    </button>
                    <i class="fas transition-transform duration-200" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                </div>
            </div>
            <div x-show="open" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform -translate-y-2" x-transition:enter-end="opacity-100 transform translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 transform translate-y-0" x-transition:leave-end="opacity-0 transform -translate-y-2" class="px-6 pb-6 border-t border-gray-200">
            
            <template x-if="form.lines.length === 0">
                <p class="text-gray-500 text-center py-4">No line items added</p>
            </template>
            
            <template x-for="(line, index) in form.lines" :key="index">
                <div class="border border-gray-200 rounded-lg p-4 mb-4">
                    <div class="flex justify-end mb-2">
                        <button type="button" @click="removeLine(index)" class="text-red-500 hover:text-red-700">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product</label>
                            <select x-model="line.product_id" @change="updateLinePrice(index)"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">Select Product</option>
                                <template x-for="product in products" :key="product.id">
                                    <option :value="product.id" x-text="product.name"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price</label>
                            <input type="number" x-model="line.unit_price" step="0.01"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                @input="calculateTotal()">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                            <input type="number" x-model="line.quantity" min="1"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                @input="calculateTotal()">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
                            <input type="text" :value="formatCurrency(line.unit_price * line.quantity)" readonly
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50">
                        </div>
                    </div>
                </div>
            </template>
            
            <!-- Totals -->
            <div class="border-t border-gray-200 pt-4 mt-4">
                <div class="flex justify-end">
                    <div class="w-64 space-y-2">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Subtotal:</span>
                            <span class="font-medium" x-text="formatCurrency(totals.subtotal)"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">Tax:</span>
                            <span class="font-medium" x-text="formatCurrency(totals.tax)"></span>
                        </div>
                        <div class="flex justify-between text-lg font-bold">
                            <span>Total:</span>
                            <span x-text="formatCurrency(totals.total)"></span>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>
        
        <!-- Actions -->
        <div x-data="{ open: true }" class="bg-white rounded-xl shadow-sm border border-gray-200">
            <div @click="open = !open" class="flex items-center justify-between p-6 cursor-pointer hover:bg-gray-50 transition-colors">
                <h2 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-cogs text-indigo-500 mr-2"></i>Actions
                </h2>
                <i class="fas transition-transform duration-200" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </div>
            <div x-show="open" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform -translate-y-2" x-transition:enter-end="opacity-100 transform translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 transform translate-y-0" x-transition:leave-end="opacity-0 transform -translate-y-2" class="px-6 pb-6 border-t border-gray-200">
            <div class="flex items-center justify-end gap-3 mt-4">
                <a href="/purchase-orders/" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                    Cancel
                </a>
                <button type="submit" :disabled="submitting"
                    class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                    <i class="fas fa-spinner fa-spin mr-2" x-show="submitting"></i>
                    Create Purchase Order
                </button>
            </div>
            </div>
        </div>
    </form>
</div>

<script>
function purchaseOrderCreate() {
    return {
        form: {
            reference: '',
            person_id: '',
            organisation_id: '',
            currency: 'USD',
            delivery_type: 'deliver',
            expected_delivery: '',
            delivery_instructions: '',
            lines: []
        },
        totals: {
            subtotal: 0,
            tax: 0,
            total: 0
        },
        people: [],
        organisations: [],
        products: [],
        submitting: false,
        
        async init() {
            await Promise.all([
                this.loadPeople(),
                this.loadOrganisations(),
                this.loadProducts()
            ]);
        },
        
        async loadPeople() {
            try {
                const response = await fetch('/api/v1/crm/people/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.people = data.data;
            } catch (error) {
                console.error('Error loading people:', error);
            }
        },
        
        async loadOrganisations() {
            try {
                const response = await fetch('/api/v1/crm/organisations/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.organisations = data.data;
            } catch (error) {
                console.error('Error loading organisations:', error);
            }
        },
        
        async loadProducts() {
            try {
                const response = await fetch('/api/v1/products/?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
                });
                const data = await response.json();
                if (data.success) this.products = data.data;
            } catch (error) {
                console.error('Error loading products:', error);
            }
        },
        
        addLine() {
            this.form.lines.push({
                product_id: '',
                unit_price: 0,
                quantity: 1
            });
        },
        
        removeLine(index) {
            this.form.lines.splice(index, 1);
            this.calculateTotal();
        },
        
        updateLinePrice(index) {
            const line = this.form.lines[index];
            const product = this.products.find(p => p.id == line.product_id);
            if (product) {
                line.unit_price = (product.default_price || 0) / 100;
            }
            this.calculateTotal();
        },
        
        calculateTotal() {
            this.totals.subtotal = this.form.lines.reduce((sum, l) => sum + (l.unit_price * l.quantity), 0);
            this.totals.tax = 0;
            this.totals.total = this.totals.subtotal + this.totals.tax;
        },
        
        formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: this.form.currency
            }).format(amount || 0);
        },
        
        async submit() {
            this.submitting = true;
            try {
                const payload = {
                    ...this.form,
                    subtotal: Math.round(this.totals.subtotal * 100),
                    tax: Math.round(this.totals.tax * 100),
                    total: Math.round(this.totals.total * 100)
                };
                
                const response = await fetch('/api/v1/purchasing/purchase-orders/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/purchase-orders/' + data.data.id;
                } else {
                    alert(data.message || 'Error creating purchase order');
                }
            } catch (error) {
                console.error('Error creating purchase order:', error);
                alert('Error creating purchase order');
            }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
