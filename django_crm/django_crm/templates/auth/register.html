{% extends 'base.html' %}

{% block title %}Register - Django CRM{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100" x-data="registerForm()">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-500 rounded-xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-briefcase text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Django CRM</h1>
            <p class="text-gray-600 mt-2">Create your account</p>
        </div>
        
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div x-show="error" x-cloak class="mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span x-text="error"></span>
            </div>
            
            <div x-show="success" x-cloak class="mb-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm">
                <i class="fas fa-check-circle mr-2"></i>
                Registration successful! Redirecting...
            </div>
            
            <form @submit.prevent="register">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
                    <input type="text" x-model="form.name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" x-model="form.email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" x-model="form.password" required minlength="8"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                    <input type="password" x-model="form.password_confirmation" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <button type="submit" :disabled="loading"
                    class="w-full bg-indigo-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-indigo-700 transition disabled:opacity-50">
                    <span x-show="!loading">Create Account</span>
                    <span x-show="loading"><i class="fas fa-spinner fa-spin mr-2"></i> Creating...</span>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">
                    Already have an account? 
                    <a href="/login" class="text-indigo-600 hover:text-indigo-700 font-medium">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
function registerForm() {
    return {
        form: { name: '', email: '', password: '', password_confirmation: '' },
        loading: false,
        error: '',
        errors: {},
        success: false,
        
        async register() {
            this.error = '';
            this.errors = {};
            if (this.form.password !== this.form.password_confirmation) {
                this.error = 'Passwords do not match';
                return;
            }
            if (this.form.password.length < 8) {
                this.error = 'Password must be at least 8 characters';
                return;
            }
            this.loading = true;
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/auth/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.form)
                });
                const data = await response.json();
                console.log('Response:', data);
                
                if (response.ok && data.success) {
                    this.success = true;
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    // Parse DRF validation errors
                    if (data.password) {
                        this.error = 'Password: ' + (Array.isArray(data.password) ? data.password.join(', ') : data.password);
                    } else if (data.email) {
                        this.error = 'Email: ' + (Array.isArray(data.email) ? data.email.join(', ') : data.email);
                    } else if (data.name) {
                        this.error = 'Name: ' + (Array.isArray(data.name) ? data.name.join(', ') : data.name);
                    } else if (data.detail) {
                        this.error = data.detail;
                    } else if (data.message) {
                        this.error = data.message;
                    } else {
                        this.error = 'Validation failed: ' + JSON.stringify(data);
                    }
                }
            } catch (err) {
                console.error('Error:', err);
                this.error = 'Network error';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
