{% extends 'layouts/app.html' %}

{% block nav_people %}bg-gray-700 text-white{% endblock %}
{% block page_title %}Add Person{% endblock %}

{% block page_content %}
<div x-data="personCreate()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="/people" class="text-gray-500 hover:text-gray-700 mr-4">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Add Person</h1>
        </div>
    </div>
    
    <!-- Form -->
    <form @submit.prevent="submit()" class="bg-white rounded-xl shadow-sm border border-gray-200">
        <div class="p-6 space-y-6">
            <!-- Error Display -->
            <div x-show="errorMsg" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                <p x-text="errorMsg"></p>
            </div>
            
            <!-- Basic Information -->
            <div>
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Basic Information</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name *</label>
                        <input type="text" x-model="form.first_name" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name *</label>
                        <input type="text" x-model="form.last_name" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                        <input type="text" x-model="form.title" placeholder="e.g. CEO, Manager"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Organisation</label>
                        <select x-model="form.organisation_id"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                            <option value="">-- Select Organisation --</option>
                            <template x-for="org in organisations" :key="org.id">
                                <option :value="org.id" x-text="org.name"></option>
                            </template>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Contact Information -->
            <div>
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Contact Information</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" x-model="form.email"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                        <input type="text" x-model="form.phone"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                </div>
            </div>
            
            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea x-model="form.description" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"></textarea>
            </div>
            
            <!-- Address -->
            <div>
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Address</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 1</label>
                        <input type="text" x-model="form.address_line_1"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 2</label>
                        <input type="text" x-model="form.address_line_2"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                        <input type="text" x-model="form.city"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">State/Province</label>
                        <input type="text" x-model="form.state"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Postcode</label>
                        <input type="text" x-model="form.postcode"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
                        <input type="text" x-model="form.country"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="px-4 sm:px-6 py-4 bg-gray-50 border-t border-gray-200 flex flex-col-reverse sm:flex-row sm:justify-end gap-3 rounded-b-xl">
            <a href="/people" class="w-full sm:w-auto text-center px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition">
                Cancel
            </a>
            <button type="submit" :disabled="submitting"
                class="w-full sm:w-auto px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition disabled:opacity-50">
                <i x-show="submitting" class="fas fa-spinner fa-spin mr-2"></i>
                <span x-text="submitting ? 'Saving...' : 'Save Person'"></span>
            </button>
        </div>
    </form>
</div>

<script>
function personCreate() {
    return {
        form: {
            first_name: '', last_name: '', title: '',
            email: '', phone: '', description: '', organisation_id: '',
            address_line_1: '', address_line_2: '',
            city: '', state: '', postcode: '', country: ''
        },
        organisations: [],
        submitting: false,
        errorMsg: '',
        
        async init() {
            // Check for pre-selected organisation from URL
            const params = new URLSearchParams(window.location.search);
            if (params.has('organisation')) {
                this.form.organisation_id = params.get('organisation');
            }
            await this.loadOrganisations();
        },
        
        async loadOrganisations() {
            try {
                const res = await api.get('/organisations/?per_page=100');
                if (res?.ok) {
                    const data = await res.json();
                    this.organisations = data.data || [];
                }
            } catch (e) { console.error(e); }
        },
        
        async submit() {
            this.submitting = true;
            this.errorMsg = '';
            
            // Build proper API payload structure
            const payload = {
                first_name: this.form.first_name,
                last_name: this.form.last_name || null,
                title: this.form.title || null,
                description: this.form.description || null,
                organisation_id: this.form.organisation_id ? parseInt(this.form.organisation_id) : null,
                emails: this.form.email ? [{ address: this.form.email, type: 'work', primary: true }] : [],
                phones: this.form.phone ? [{ number: this.form.phone, type: 'work', primary: true }] : [],
                addresses: (this.form.address_line_1 || this.form.city) ? [{
                    line1: this.form.address_line_1 || null,
                    line2: this.form.address_line_2 || null,
                    city: this.form.city || null,
                    state: this.form.state || null,
                    code: this.form.postcode || null,
                    country: this.form.country || null,
                    primary: true
                }] : []
            };
            
            // Remove null organisation_id
            if (!payload.organisation_id) delete payload.organisation_id;
            
            try {
                const res = await api.post('/people/', payload);
                if (res?.ok) {
                    const data = await res.json();
                    window.location.href = '/people/' + (data.data?.id || data.id) + '/';
                } else {
                    const err = await res?.json();
                    console.error('API Error:', err);
                    this.errorMsg = err?.message || err?.detail || JSON.stringify(err.errors || err) || 'Failed to create person';
                }
            } catch (e) {
                console.error(e);
                this.errorMsg = 'An error occurred. Please try again.';
            }
            
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
